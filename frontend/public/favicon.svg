  <rect x="9" y="16.4" width="14" height="3.2" fill="#f3f6f7" clip-path="url(#float)"/>
  <!-- water -->
  <path d="M4 25.5 q3 -2.2 6 0 t6 0 t6 0 t6 0" fill="none" stroke="#2f7f9e" stroke-width="1.8" stroke-linecap="round"/>
