<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0b1a20"/>
  <!-- mast + light -->
  <rect x="15.2" y="6" width="1.6" height="8" fill="#9fb4bd"/>
  <circle cx="16" cy="5.2" r="2.4" fill="#ffd33d"/>
  <!-- float body -->
